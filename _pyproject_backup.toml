[project]
name = "fractal"
version = "0.1.0"
description = "Python-native audio pipeline for composing, layering, and exporting music without a DAW"
requires-python = ">=3.11"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
